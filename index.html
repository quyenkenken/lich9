<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App đang bảo trì</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #111827;
    }
    .card {
      width: min(560px, calc(100vw - 32px));
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }
    p {
      margin: 8px 0;
      color: #475467;
      line-height: 1.6;
    }
    .small {
      margin-top: 20px;
      font-size: 13px;
      color: #98a2b3;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>App đang tạm bảo trì</h1>
    <p>Personal Tracker Pro đang được kiểm tra lại để tránh lỗi dữ liệu và thông báo Telegram.</p>
    <p>Vui lòng quay lại sau.</p>
    <div class="small">Maintenance mode</div>
  </main>
</body>
</html>
